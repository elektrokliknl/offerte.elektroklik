<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:#1a1a1a;background:#fff;line-height:1.65;-webkit-font-smoothing:antialiased}
a{color:inherit}ul{list-style:none}img,svg{display:block}button{font-family:inherit}
:root{
  --teal:#0E7A78;--teal-d:#095e5c;--teal-l:#e6f4f4;
  --blauw:#0E4A72;--oranje:#F5A623;--oranje-d:#d48a10;
  --tekst:#1a1a1a;--tekst2:#4a4a4a;--tekst3:#6b7280;
  --rand:#e2e8f0;--rand2:#cbd5e1;--fout:#dc2626;--succes:#059669;
  --r6:6px;--r10:10px;--r16:16px;
}
.container{max-width:1120px;margin:0 auto;padding:0 24px}
.verborgen{display:none!important}
.sectie{padding:64px 0}.sectie-alt{background:#f8fafc}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--rand);height:64px;display:flex;align-items:center}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.logo img{height:38px;width:auto;display:block}
.header-spoed{display:flex;align-items:center;gap:8px;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r10);padding:8px 14px;text-decoration:none;color:#b91c1c;font-size:.875rem;font-weight:600;white-space:nowrap;transition:background .18s}
.header-spoed:hover{background:#fee2e2}
.header-spoed svg{width:16px;height:16px;flex-shrink:0}

/* HERO */
.hero{background:linear-gradient(135deg,#0b3f5e 0%,#0E4A72 55%,#0a6068 100%);padding:72px 0 80px}
.hero-inner{display:grid;grid-template-columns:1fr 468px;gap:56px;align-items:start}
.hero-tekst{color:#fff}
.eyebrow{display:inline-block;font-size:.8125rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--oranje);margin-bottom:16px}
.hero-tekst h1{font-size:clamp(1.75rem,3vw,2.5rem);font-weight:800;line-height:1.2;margin-bottom:20px;color:#fff}
.hero-sub{font-size:1.05rem;color:rgba(255,255,255,.82);max-width:480px;margin-bottom:32px;line-height:1.6}
.hero-checks{display:flex;flex-direction:column;gap:11px}
.hero-checks li{display:flex;align-items:center;gap:10px;font-size:.9375rem;color:rgba(255,255,255,.9)}
.hero-checks li svg{width:20px;height:20px;flex-shrink:0}

/* FUNNEL KAART */
.funnel-kaart{background:#fff;border-radius:var(--r16);box-shadow:0 12px 40px rgba(0,0,0,.14),0 4px 12px rgba(0,0,0,.07);overflow:hidden}

/* Voortgang */
.voortgang{display:flex;align-items:center;padding:18px 24px 0;margin-bottom:2px}
.vstap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.vstap-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;background:var(--rand);color:var(--tekst3);transition:background .25s,color .25s}
.vstap-lbl{font-size:.75rem;font-weight:500;color:var(--tekst3);transition:color .25s}
.vstap.actief .vstap-num{background:var(--teal);color:#fff}
.vstap.actief .vstap-lbl{color:var(--teal)}
.vstap.klaar .vstap-num{background:var(--succes);color:#fff}
.vstap.klaar .vstap-lbl{color:var(--succes)}
.vlijn{flex:1;height:2px;background:var(--rand);margin:0 6px;border-radius:2px;transition:background .25s}
.vlijn.klaar{background:var(--succes)}

/* Stap */
.stap{border:none;padding:20px 24px 24px}
.stap-kop{margin-bottom:18px}
.terug{display:inline-flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-size:.8125rem;font-weight:500;color:var(--teal);padding:0;margin-bottom:8px;transition:color .15s}
.terug:hover{color:var(--teal-d)}
.terug svg{width:16px;height:16px}
.stap-titel{font-size:1.15rem;font-weight:700;color:var(--tekst);margin-bottom:4px}
.stap-sub{font-size:.85rem;color:var(--tekst3)}

/* Velden */
.veld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.veld:last-child{margin-bottom:0}
.veld label{font-size:.85rem;font-weight:600;color:var(--tekst)}
.veld input[type=text],.veld input[type=tel],.veld input[type=email],.veld textarea{width:100%;padding:10px 13px;border:1.5px solid var(--rand2);border-radius:var(--r6);font-size:.9375rem;font-family:inherit;color:var(--tekst);background:#fff;outline:none;transition:border-color .18s,box-shadow .18s;-webkit-appearance:none;appearance:none}
.veld input:focus,.veld textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,122,120,.12)}
.veld input.fout,.veld textarea.fout{border-color:var(--fout)}
.veld textarea{resize:vertical;min-height:76px}
.veld-fout{font-size:.78rem;font-weight:500;color:var(--fout);display:none}
.veld-fout.zichtbaar{display:block}
.req{color:var(--fout)}

/* Radio knop groep (Ja/Nee/Weet ik niet stijl) */
.radio-groep{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.radio-knop{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1.5px solid var(--rand2);border-radius:var(--r6);cursor:pointer;font-size:.875rem;font-weight:500;color:var(--tekst2);transition:border-color .18s,background .18s,color .18s;background:#fff}
.radio-knop:hover{border-color:var(--teal);background:var(--teal-l);color:var(--teal)}
.radio-knop input[type=radio]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.radio-knop.geselecteerd{border-color:var(--teal);background:var(--teal-l);color:var(--teal);font-weight:600}

/* Postcode rij */
.pc-rij{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pc-rij .veld{margin-bottom:0}

/* Veld rij */
.vrij{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.vrij .veld{margin-bottom:0}

/* Dienst kaarten */
.dienst-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.dienst-kaart{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 8px;border:1.5px solid var(--rand2);border-radius:var(--r10);cursor:pointer;background:#fff;text-align:center;transition:border-color .18s,background .18s,box-shadow .18s;position:relative}
.dienst-kaart:hover{border-color:var(--teal);background:var(--teal-l)}
.dienst-kaart input[type=radio]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.dienst-kaart.geselecteerd{border-color:var(--teal);background:var(--teal-l);box-shadow:0 0 0 3px rgba(14,122,120,.18)}
.dienst-kaart.storing-kaart.geselecteerd{border-color:#dc6b19;box-shadow:0 0 0 3px rgba(220,107,25,.15);background:#fff7ed}
.d-ikoon{width:40px;height:40px;border-radius:9px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;color:var(--teal);transition:background .18s}
.d-ikoon svg{width:20px;height:20px}
.dienst-kaart:hover .d-ikoon,.dienst-kaart.geselecteerd .d-ikoon{background:rgba(14,122,120,.15)}
.storing-kaart .d-ikoon{color:#dc6b19}
.storing-kaart.geselecteerd .d-ikoon{background:rgba(220,107,25,.12)}
.d-naam{font-size:.78rem;font-weight:600;color:var(--tekst);line-height:1.3}

/* Spoed melding */
.spoed-melding{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r10);font-size:.85rem;color:#9a3412;margin-bottom:12px}
.spoed-melding svg{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:#ea580c}
.spoed-melding a{color:#9a3412;font-weight:700}

/* Sectie label */
.veld-sectie-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tekst3);margin-bottom:6px;margin-top:14px}
.veld-sectie-label:first-child{margin-top:0}

/* Privacy */
.privacy-veld{margin-bottom:14px}
.cb-label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.875rem;color:var(--tekst2)}
.cb-label input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:2px;accent-color:var(--teal);cursor:pointer}
.cb-label a{color:var(--teal);text-decoration:underline}

/* Volgende knop */
.btn-volgende{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 24px;background:var(--teal);color:#fff;border:none;border-radius:var(--r10);font-size:.9375rem;font-weight:700;cursor:pointer;transition:background .18s,transform .12s;margin-top:4px}
.btn-volgende:hover{background:var(--teal-d)}
.btn-volgende:active{transform:scale(.985)}
.btn-volgende svg{width:17px;height:17px}
.btn-verstuur{background:var(--oranje);color:#1a1a1a}
.btn-verstuur:hover{background:var(--oranje-d);color:#fff}
.form-noot{text-align:center;font-size:.75rem;color:var(--tekst3);margin-top:8px}

/* Succes */
.form-succes{padding:36px 24px;text-align:center}
.form-succes svg{width:44px;height:44px;margin:0 auto 14px}
.form-succes h3{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.form-succes p{font-size:.9rem;color:var(--tekst2);margin-bottom:6px}
.form-succes a{color:var(--teal);font-weight:600}

/* VERTROUWEN */
.vertrouwen{background:#fff;border-bottom:1px solid var(--rand);padding:30px 0}
.vertrouwen-rij{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.vt-item{display:flex;align-items:flex-start;gap:13px}
.vt-item svg{width:24px;height:24px;flex-shrink:0;margin-top:3px;color:var(--teal)}
.vt-item strong{display:block;font-size:.85rem;font-weight:700;margin-bottom:2px}
.vt-item span{font-size:.8rem;color:var(--tekst3)}

/* DIENSTEN */
.diensten-sectie h2{font-size:1.5rem;font-weight:800;margin-bottom:28px}
.diensten-rij{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.ds-kaart{padding:22px;border:1px solid var(--rand);border-radius:var(--r16);background:#fff;transition:box-shadow .2s,border-color .2s}
.ds-kaart:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ds-ikoon{width:44px;height:44px;border-radius:var(--r10);background:var(--teal-l);color:var(--teal);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.ds-ikoon svg{width:22px;height:22px}
.ds-ikoon.storing{background:#fff7ed;color:#dc6b19}
.ds-kaart h3{font-size:.9375rem;font-weight:700;margin-bottom:6px}
.ds-kaart p{font-size:.85rem;color:var(--tekst2);line-height:1.55}

/* FAQ */
.faq-inner{max-width:700px;margin:0 auto}
.faq-inner h2{font-size:1.5rem;font-weight:800;margin-bottom:24px}
.faq-lijst{display:flex;flex-direction:column;gap:2px}
.faq-item{border:1px solid var(--rand);border-radius:var(--r10);background:#fff;overflow:hidden}
.faq-vraag{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;padding:16px 18px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--tekst);text-align:left;transition:background .15s}
.faq-vraag:hover{background:#f8fafc}
.faq-vraag svg{width:17px;height:17px;flex-shrink:0;color:var(--tekst3);transition:transform .22s}
.faq-vraag[aria-expanded=true] svg{transform:rotate(180deg)}
.faq-antwoord{padding:0 18px 16px;border-top:1px solid var(--rand)}
.faq-antwoord p{font-size:.875rem;color:var(--tekst2);line-height:1.65}

/* CTA SLOT */
.cta-slot{background:linear-gradient(135deg,#0b3f5e 0%,#0E4A72 100%);padding:52px 0}
.cta-slot-inner{display:flex;align-items:center;justify-content:space-between;gap:32px}
.cta-slot h2{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:8px}
.cta-slot p{color:rgba(255,255,255,.75);font-size:.95rem}
.btn-cta{display:inline-flex;align-items:center;padding:15px 30px;background:var(--oranje);color:#1a1a1a;border-radius:var(--r10);font-size:1rem;font-weight:800;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .18s,transform .12s}
.btn-cta:hover{background:var(--oranje-d);color:#fff}

/* FOOTER */
.footer{background:var(--blauw);color:rgba(255,255,255,.85)}
.footer-inner{display:grid;grid-template-columns:1fr auto;gap:40px;padding:36px 0;align-items:start}
.footer-merk img{height:32px;width:auto;filter:brightness(0) invert(1);opacity:.9}
.footer-merk p{font-size:.82rem;color:rgba(255,255,255,.5);margin-top:8px}
.footer-contact{text-align:right}
.footer-contact p{font-size:.85rem;margin-bottom:6px}
.footer-contact a{color:rgba(255,255,255,.85);text-decoration:none}
.footer-contact a:hover{color:#fff;text-decoration:underline}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding:14px 0}
.footer-bottom p{font-size:.8rem;color:rgba(255,255,255,.4)}

/* STICKY SPOED */
.sticky-spoed{display:none;position:fixed;bottom:20px;right:20px;z-index:200;background:#dc2626;color:#fff;padding:13px 17px;border-radius:50px;text-decoration:none;font-size:.875rem;font-weight:700;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(220,38,38,.4);transition:background .18s}
.sticky-spoed svg{width:18px;height:18px}
.sticky-spoed:hover{background:#b91c1c}

:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
@keyframes stapIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stap:not(.verborgen){animation:stapIn .2s ease-out}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

@media(max-width:1024px){
  .hero-inner{grid-template-columns:1fr;gap:36px}
  .hero-sub{max-width:100%}
  .funnel-kaart{max-width:520px}
  .diensten-rij{grid-template-columns:repeat(2,1fr)}
  .vertrouwen-rij{grid-template-columns:repeat(2,1fr)}
  .cta-slot-inner{flex-direction:column;text-align:center}
}
@media(max-width:640px){
  .hero{padding:40px 0 44px}
  .hero-tekst h1{font-size:1.55rem}
  .hero-sub{font-size:.95rem}
  .header-spoed .spoed-label{display:none}
  .funnel-kaart{border-radius:var(--r10)}
  .stap{padding:16px 16px 20px}
  .voortgang{padding:14px 16px 0}
  .vstap-lbl{display:none}
  .pc-rij{grid-template-columns:1fr 1fr}
  .vrij{grid-template-columns:1fr}
  .dienst-grid{gap:7px}
  .d-ikoon{width:34px;height:34px;border-radius:7px}
  .d-ikoon svg{width:17px;height:17px}
  .d-naam{font-size:.74rem}
  .radio-groep{gap:6px}
  .radio-knop{padding:8px 11px;font-size:.82rem}
  .diensten-rij{grid-template-columns:1fr;gap:10px}
  .vertrouwen-rij{grid-template-columns:1fr;gap:14px}
  .vertrouwen{padding:22px 0}
  .cta-slot{padding:36px 0}
  .cta-slot h2{font-size:1.2rem}
  .btn-cta{width:100%;justify-content:center}
  .footer-inner{grid-template-columns:1fr;gap:18px}
  .footer-contact{text-align:left}
  .sticky-spoed{display:flex}
}
</style>
</head>

<main>

      <h1>Elektricien voor uw woning?<br>Wij regelen het snel en netjes.</h1>

        <li><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" aria-hidden="true"><circle cx="10" cy="10" r="10" fill="#0E7A78"/><polyline points="5,10.5 8.5,14 15,7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>Gratis en vrijblijvend</li>
      </ul>
    </div>

    <div class="funnel-kaart" id="funnelKaart" aria-live="polite">
      <!-- Voortgangsbalk: 4 stappen -->
      <div class="voortgang" aria-hidden="true">
        <div class="vstap actief" id="vstap1"><span class="vstap-num">1</span><span class="vstap-lbl">Postcode</span></div>
        <div class="vlijn" id="vlijn1"></div>
        <div class="vstap" id="vstap2"><span class="vstap-num">2</span><span class="vstap-lbl">Dienst</span></div>

    <div class="faq-lijst">
      <div class="faq-item"><button class="faq-vraag" aria-expanded="false" aria-controls="faq1">Hoe snel krijg ik een reactie na mijn aanvraag?<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button><div class="faq-antwoord" id="faq1" hidden><p>Wij streven ernaar om binnen <strong>1 werkdag</strong> te reageren. In de meeste gevallen nemen wij al dezelfde dag contact op om de situatie door te nemen en een afspraak in te plannen.</p></div></div>
      <div class="faq-item"><button class="faq-vraag" aria-expanded="false" aria-controls="faq2">Wat kost een laadpaal installatie?<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button><div class="faq-antwoord" id="faq2" hidden><p>De kosten zijn afhankelijk van uw situatie: de afstand van de meterkast, het type montage en of er uitbreidingen nodig zijn. Na uw aanvraag ontvangt u een duidelijke, transparante offerte zonder verborgen kosten.</p></div></div>
      <div class="faq-item"><button class="faq-vraag" aria-expanded="false" aria-controls="faq3">Zijn uw monteurs gecertificeerd?<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button><div class="faq-antwoord" id="faq3" hidden><p>Ja. Onze monteurs zijn gecertificeerd en werken conform de geldende NEN-normen. Dit is van belang voor uw veiligheid, uw verzekering en de waarde van uw woning.</p></div></div>
      <div class="faq-item"><button class="faq-vraag" aria-expanded="false" aria-controls="faq4">In welke regio werkt ElektroKlik?<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg></button><div class="faq-antwoord" id="faq4" hidden><p>ElektroKlik is actief in Amersfoort en omgeving: Leusden, Soest, Nijkerk, Hoevelaken, Baarn, Bunschoten en directe omgeving. Vul uw postcode in bij de aanvraag, dan controleren wij direct of wij bij u kunnen werken.</p></div></div>

<script>
(function(){
'use strict';

var huidigeStap = 1;
var gekozenDienst = null;

var dienstTitels = {
  laadpaal: 'Laadpaal – uw situatie',
  groepenkast: 'Groepenkast – uw situatie',
  inductie: 'Inductiekookplaat – uw situatie',
  perilex: 'Perilex aansluiting – uw situatie',
  storing: 'Elektra storing – uw situatie'
};

window.naarStap = function(nr) {
  if (nr > huidigeStap && !valideer(huidigeStap)) return;
  toon(nr);
};

function toon(nr) {
  // Verberg alle stappen 1-4
  [1,2,3,4].forEach(function(i){
    var el = document.getElementById('stap'+i);
    if (el) el.classList.add('verborgen');
  });
  var doel = document.getElementById('stap'+nr);
  if (doel) {
    doel.classList.remove('verborgen');
    var input = doel.querySelector('input:not([type=radio]):not([type=checkbox]), textarea');
    if (input) setTimeout(function(){ input.focus(); }, 60);
  }
  if (window.innerWidth <= 640) {
    var kaart = document.getElementById('funnelKaart');
    if (kaart) setTimeout(function(){ kaart.scrollIntoView({behavior:'smooth',block:'start'}); }, 60);
  }
  huidigeStap = nr;
  updateVoortgang(nr);
}

function updateVoortgang(actief) {
  [1,2,3,4].forEach(function(i){
    var el = document.getElementById('vstap'+i);
    if (!el) return;
    el.classList.remove('actief','klaar');
    if (i < actief) el.classList.add('klaar');
    if (i === actief) el.classList.add('actief');
  });
  [1,2,3].forEach(function(i){
    var lijn = document.getElementById('vlijn'+i);
    if (!lijn) return;
    lijn.classList.toggle('klaar', actief > i+1);
  });
}

function valideer(stap) {
  if (stap === 1) return valideerStap1();
  if (stap === 2) return valideerStap2();
  if (stap === 3) return true; // Stap 3 vragen zijn allemaal optioneel
  if (stap === 4) return valideerStap4();
  return true;
}

function valideerStap1() {
  var ok = true;
  var pc = document.getElementById('postcode');
  var pcV = pc ? pc.value.trim().replace(/\\s/g,'') : '';
  if (!pc || !/^[1-9][0-9]{3}[a-zA-Z]{2}$/.test(pcV)) { setFout(pc,'fout-postcode',true); ok=false; }
  else { setFout(pc,'fout-postcode',false); }
  var hnr = document.getElementById('huisnummer');
  if (!hnr || hnr.value.trim().length < 1) { setFout(hnr,'fout-huisnummer',true); ok=false; }
  else { setFout(hnr,'fout-huisnummer',false); }
  return ok;
}

function valideerStap2() {
  var gekozen = document.querySelector('input[name=dienst]:checked');
  var fEl = document.getElementById('fout-dienst');
  if (!gekozen) { if(fEl) fEl.classList.add('zichtbaar'); return false; }
  if (fEl) fEl.classList.remove('zichtbaar');
  return true;
}

function valideerStap4() {
  var ok = true;
  var naam = document.getElementById('naam');
  if (!naam || naam.value.trim().length < 2) { setFout(naam,'fout-naam',true); ok=false; }
  else { setFout(naam,'fout-naam',false); }
  var tel = document.getElementById('telefoon');
  var telV = tel ? tel.value.replace(/[\\s\\-().+]/g,'') : '';
  if (!tel || telV.length < 9 || !/^\\d+$/.test(telV)) { setFout(tel,'fout-telefoon',true); ok=false; }
  else { setFout(tel,'fout-telefoon',false); }
  var email = document.getElementById('email');
  if (!email || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email.value.trim())) { setFout(email,'fout-email',true); ok=false; }
  else { setFout(email,'fout-email',false); }
  var priv = document.getElementById('privacy');
  var privF = document.getElementById('fout-privacy');
  if (!priv || !priv.checked) { if(privF) privF.classList.add('zichtbaar'); ok=false; }
  else { if(privF) privF.classList.remove('zichtbaar'); }
  return ok;
}

function setFout(el, foutId, tonen) {
  if (el) {
    el.classList.toggle('fout', tonen);
    if (tonen) el.setAttribute('aria-invalid','true');
    else el.removeAttribute('aria-invalid');
  }
  var f = document.getElementById(foutId);
  if (f) f.classList.toggle('zichtbaar', tonen);
}

/* Dienst selectie */
function initDienstKaarten() {
  document.querySelectorAll('.dienst-kaart input[type=radio]').forEach(function(radio){
    radio.addEventListener('change', function(){
      // Selectie styling
      document.querySelectorAll('.dienst-kaart').forEach(function(k){ k.classList.remove('geselecteerd'); });
      var label = radio.closest('.dienst-kaart');
      if (label) label.classList.add('geselecteerd');
      // Spoed melding
      var m = document.getElementById('spoedMelding');
      if (m) m.classList.toggle('verborgen', this.value !== 'storing');
      // Onthoud gekozen dienst
      gekozenDienst = this.value;
    });
  });
}

/* Toon juiste vragen op stap 3 */
function initDienstVragen() {
  // Luister op de volgende-knop van stap 2
  var stap2 = document.getElementById('stap2');
  if (!stap2) return;
  var knop = stap2.querySelector('.btn-volgende');
  if (!knop) return;
  // Override onclick
  knop.onclick = function(){
    if (!valideer(2)) return;
    // Toon juiste vragen sectie
    document.querySelectorAll('.dienst-vragen').forEach(function(v){ v.classList.add('verborgen'); });
    var vrGroup = document.getElementById('vragen-' + gekozenDienst);
    if (vrGroup) vrGroup.classList.remove('verborgen');
    // Zet stap 3 titel
    var titel = document.getElementById('stap3Titel');
    if (titel && dienstTitels[gekozenDienst]) titel.textContent = dienstTitels[gekozenDienst];
    toon(3);
  };
}

/* Radio knop styling */
function initRadioKnoppen() {
  document.querySelectorAll('.radio-knop input[type=radio]').forEach(function(radio){
    radio.addEventListener('change', function(){
      var groep = this.name;
      document.querySelectorAll('input[name="'+groep+'"]').forEach(function(r){
        var label = r.closest('.radio-knop');
        if (label) label.classList.remove('geselecteerd');
      });
      var mijnLabel = this.closest('.radio-knop');
      if (mijnLabel) mijnLabel.classList.add('geselecteerd');
      // Spoed check bij storing
      if (this.name === 'st_spoed') {
        var m2 = document.getElementById('spoedMelding2');
        if (m2) m2.style.display = this.value.indexOf('snel') !== -1 ? 'flex' : 'none';
      }
    });
  });
}

/* Spoed melding stap 2 */
function initSpoed() {
  document.querySelectorAll('input[name=dienst]').forEach(function(r){
    r.addEventListener('change', function(){
      var m = document.getElementById('spoedMelding');
      if (m) m.classList.toggle('verborgen', this.value !== 'storing');
    });
  });
}

/* FAQ */
function initFAQ() {
  document.querySelectorAll('.faq-vraag').forEach(function(btn){
    btn.addEventListener('click', function(){
      var open = this.getAttribute('aria-expanded') === 'true';
      var antwoord = document.getElementById(this.getAttribute('aria-controls'));
      document.querySelectorAll('.faq-vraag').forEach(function(b){
        b.setAttribute('aria-expanded','false');
        var a = document.getElementById(b.getAttribute('aria-controls'));
        if(a) a.hidden = true;
      });
      if (!open) {
        this.setAttribute('aria-expanded','true');
        if (antwoord) antwoord.hidden = false;
      }
    });
  });
}

/* Formulier submit */
function initForm() {
  var form = document.getElementById('aanvraagForm');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    if (!valideer(4)) return;
    verstuur();
  });
  ['naam','telefoon','email'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.addEventListener('input', function(){ setFout(el,'fout-'+id,false); });
  });
  var priv = document.getElementById('privacy');
  if (priv) priv.addEventListener('change', function(){ setFout(null,'fout-privacy',false); });
  var pc = document.getElementById('postcode');
  if (pc) pc.addEventListener('input', function(){ setFout(pc,'fout-postcode',false); });
  var hnr = document.getElementById('huisnummer');
  if (hnr) hnr.addEventListener('input', function(){ setFout(hnr,'fout-huisnummer',false); });
}

function verstuur() {
  var btn = document.getElementById('submitBtn');
  var t = document.getElementById('btnTekst');
  var l = document.getElementById('btnLaad');
  if (btn) btn.disabled = true;
  if (t) t.classList.add('verborgen');
  if (l) l.classList.remove('verborgen');
  var form = document.getElementById('aanvraagForm');
  fetch('https://formspree.io/f/xjgzdzww', {
    method:'POST',body:new FormData(form),headers:{'Accept':'application/json'}
  }).then(function(r){
    if (r.ok) { succes(); } else { mislukt(); resetBtn(btn,t,l); }
  }).catch(function(){ mislukt(); resetBtn(btn,t,l); });
}

function succes() {
  var form = document.getElementById('aanvraagForm');
  var vg = document.querySelector('.voortgang');
  var s = document.getElementById('formSucces');
  if (form) form.classList.add('verborgen');
  if (vg) vg.style.display = 'none';
  if (s) { s.classList.remove('verborgen'); s.scrollIntoView({behavior:'smooth',block:'center'}); }
}

function mislukt() {
  if (document.getElementById('submit-fout')) return;
  var p = document.createElement('p');
  p.id = 'submit-fout';
  p.setAttribute('role','alert');
  p.style.cssText = 'color:#dc2626;font-size:.85rem;font-weight:600;text-align:center;padding:11px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;margin-top:10px;';
  p.textContent = 'Er is iets misgegaan. Probeer het opnieuw of bel ons direct.';
  var btn = document.getElementById('submitBtn');
  if (btn) btn.parentNode.insertBefore(p, btn.nextSibling);
}

function resetBtn(btn,t,l) {
  if (btn) btn.disabled = false;
  if (t) t.classList.remove('verborgen');
  if (l) l.classList.add('verborgen');
}

function initCTA() {
  var cta = document.getElementById('ctaKnop');
  if (!cta) return;
  cta.addEventListener('click', function(e){
    e.preventDefault();
    var kaart = document.getElementById('funnelKaart');
    if (kaart) {
      window.scrollTo({top: kaart.getBoundingClientRect().top + window.scrollY - 80, behavior:'smooth'});
      setTimeout(function(){ var inp = document.getElementById('postcode'); if(inp) inp.focus(); }, 400);
    }
  });
}

function initJaar() {
  var el = document.getElementById('jaar');
  if (el) el.textContent = new Date().getFullYear();
}

document.addEventListener('DOMContentLoaded', function(){
  toon(1);
  initSpoed();
  initDienstKaarten();
  initDienstVragen();
  initRadioKnoppen();
  initFAQ();
  initForm();
  initCTA();
  initJaar();
});

})();
</script>
